name: AI DevOps Mirror - CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t ai-devops-mirror ./docker

      - name: Run repository analysis container
        run: docker run ai-devops-mirror
