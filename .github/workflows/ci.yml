name: AI DevOps Mirror - CI Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with history)
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Build Docker image
        run: docker build -t ai-devops-mirror -f docker/Dockerfile .

      - name: Run container (THIS IS THE FIX)
        run: docker run --name temp_container ai-devops-mirror

      - name: Copy README from container
        run: docker cp temp_container:/app/README.md ./README.md

      - name: Remove container
        run: docker rm temp_container

      - name: Force update timestamp (VERY IMPORTANT)
        run: echo "Last updated: $(date)" >> README.md

      - name: Commit updated README
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Auto-update README with analysis" || echo "No changes"
          git push