name: AI DevOps Mirror - CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with history)
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Build Docker image
        run: docker build -t ai-devops-mirror -f docker/Dockerfile .

      - name: Run analysis container
        run: docker run -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} ai-devops-mirror

      - name: Commit updated README
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "AI: Auto-update README with code analysis" || echo "No changes"
          git push