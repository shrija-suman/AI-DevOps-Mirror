name: AI DevOps Mirror - CI Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t ai-devops-mirror -f docker/Dockerfile .

      - name: Run container
        run: docker run --name temp_container ai-devops-mirror

      - name: Copy README from container
        run: |
          docker cp temp_container:/app/README.md ./README.md
          ls -l README.md   # 👈 to verify file exists

      - name: Remove container
        run: docker rm temp_container

      - name: Commit updated README
  run: |
    git config --global user.name "github-actions"
    git config --global user.email "actions@github.com"

    echo "---- DEBUG: showing README ----"
    cat README.md

    git add README.md
    git commit -m "Auto-update README (date)" || echo "No changes"
    git push